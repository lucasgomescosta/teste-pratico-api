spring.application.name=teste-pratico-api

# Datasource Postgres
spring.datasource.url=jdbc:postgresql://localhost:5432/ocorrencias
spring.datasource.username=postgres
spring.datasource.password=postgres

# ========================
# FLYWAY
# ========================
spring.flyway.enabled=true
spring.flyway.default-schema=ocorrencias
spring.flyway.create-schemas=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.out-of-order=true

# ========================
# JPA / HIBERNATE
# ========================
spring.jpa.properties.hibernate.default_schema=ocorrencias
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false