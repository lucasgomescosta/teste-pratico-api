spring.application.name=teste-pratico-api

# Datasource Postgres
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ocorrencias}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

# ========================
# FLYWAY
# ========================
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=true
spring.flyway.schemas=ocorrencias
spring.flyway.default-schema=${SPRING_FLYWAY_DEFAULT_SCHEMA:ocorrencias}
spring.flyway.create-schemas=${SPRING_FLYWAY_CREATE_SCHEMAS:true}
spring.flyway.locations=${SPRING_FLYWAY_LOCATIONS:classpath:db/migration}
spring.flyway.out-of-order=true

# ========================
# JPA / HIBERNATE
# ========================
spring.jpa.properties.hibernate.default_schema=${SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA:ocorrencias}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.transaction.jta.platform=org.hibernate.engine.transaction.jta.platform.internal.NoJtaPlatform

# ===========================
# JWT
# ===========================
jwt.secret=${JWT_SECRET:minha-chave-super-segura-com-pelo-menos-32-bytes}
jwt.expiration=${JWT_EXPIRATION:1800000}

# ===========================
# Minio
# ===========================
minio.url=${MINIO_URL:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
minio.bucket=${MINIO_BUCKET:ocorrencias-evidencias}

server.port=${SERVER_PORT:8080}