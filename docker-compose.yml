version: "3.9"

services:
  postgres:
    image: postgres:17
    container_name: teste-pratico-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ocorrencias
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ocorrencias"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - teste-pratico-network

  minio:
    image: minio/minio:latest
    container_name: teste-pratico-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - teste-pratico-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: teste-pratico-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ocorrencias
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: ocorrencias

      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_DEFAULT_SCHEMA: ocorrencias
      SPRING_FLYWAY_CREATE_SCHEMAS: "true"
      SPRING_FLYWAY_LOCATIONS: classpath:db/migration

      JWT_SECRET: minha-chave-super-segura-com-pelo-menos-32-bytes
      JWT_EXPIRATION: 1800000

      MINIO_URL: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: ocorrencias

      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    networks:
      - teste-pratico-network

volumes:
  postgres_data:
  minio_data:

networks:
  teste-pratico-network:
    driver: bridge